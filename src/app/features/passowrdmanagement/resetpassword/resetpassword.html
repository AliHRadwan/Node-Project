<form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" class="register-form">

  <!-- Password -->
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>New Password</mat-label>
    <input matInput type="password" formControlName="password" />
    <mat-error *ngIf="resetPasswordForm.get('password')?.errors?.['required']">
      Password is required.
    </mat-error>
    <mat-error *ngIf="resetPasswordForm.get('password')?.errors?.['minlength']">
      Must be at least 8 characters.
    </mat-error>
    <mat-error *ngIf="resetPasswordForm.get('password')?.errors?.['pattern']">
      Must contain at least one uppercase, one lowercase, and one number.
    </mat-error>
  </mat-form-field>

  <!-- Confirm Password -->
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Confirm Password</mat-label>
    <input matInput type="password" formControlName="confirmPassword" />
    <mat-error *ngIf="resetPasswordForm.get('confirmPassword')?.errors?.['required']">
      Confirm Password is required.
    </mat-error>
    <mat-error *ngIf="resetPasswordForm.get('confirmPassword')?.errors?.['mismatch'] && resetPasswordForm.get('confirmPassword')?.dirty">
      Passwords do not match.
    </mat-error>
  </mat-form-field>

  <button mat-raised-button color="primary" type="submit">
    Reset Password
  </button>

  <div class="login-link">
    Remember your password? <a routerLink="/features/login">Login here</a>
  </div>

</form>

<!-- Popup message/loading box -->
<div class="message-box" *ngIf="isLoading || message">
  <div class="backdrop"></div>
  <div class="box-inner" [class.error]="isError" [class.success]="!isError && !isLoading">
    <button type="button" class="close-btn" (click)="message=''; isLoading=false; isError=false">×</button>
    <div class="row">
      <div class="spinner" *ngIf="isLoading"></div>
      <div class="text" *ngIf="!isLoading">
        {{ message }}
      </div>
      <div class="text" *ngIf="isLoading">
        Processing, please wait...
      </div>
    </div>
  </div>
</div>
