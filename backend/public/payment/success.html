<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Payment Successful</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }

        h1 {
            color: #4CAF50;
        }

        #loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <h1>Thank You!</h1>
    <p>Your payment was successful and your order is being processed.</p>

    <div id="orderDetails">
        <p>Fetching your payment session details...</p>
        <div id="loader"></div>
    </div>

    <p><a href="/">Return to Homepage</a></p>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session_id');
            const orderDetailsDiv = document.getElementById('orderDetails');

            setTimeout(() => {
                if (sessionId) {
                    orderDetailsDiv.innerHTML = `
                        <p><strong>Your payment session ID:</p>
                        <p><strong>${sessionId}</strong></p>
                        `;
                } else {
                    orderDetailsDiv.innerHTML = "<p>Could not find session ID.</p>";
                }
            }, 2000);
        });

    </script>
</body>

</html>
